<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>spatial-audio-demo</title>

  <!-- A-Frame (360 video) -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <!-- Omnitone (FOA -> binaural) -->
  <script src="https://cdn.jsdelivr.net/npm/omnitone@0.3.2/build/omnitone.min.js"></script>

  <style>
    :root{
      /* =======================
         LAYOUT KNOBS (EDIT HERE)
         =======================
         --page-max : overall page width. Larger = easier to fit 4 videos in one row.
         --viewer-h : each 360 video height. Smaller = easier to fit 4 videos.
      */

      /* ====== TUNE THESE TWO TO FIT 4 VIDEOS IN ONE ROW ===== = */
      --page-max: 1800px;   /* make larger if your screen is wide */
      --viewer-h: 230px;    /* video height for each column */
      /* ======================================================= */

      --radius: 14px;
      --border: #ececec;
      --muted: #666;
    }

    body{
      font-family: Arial, sans-serif;
      max-width: var(--page-max);
      margin: 0 auto;
      padding: 22px;
      background: #fff;
      color: #111;
    }

    h1{margin:0 0 10px 0; font-size: 26px;}
    .hint{margin: 4px 0 16px 0; color: #222; text-align:center; font-weight:600;}
    .tiny{margin-top:8px; color: var(--muted); font-size: 12px; line-height: 1.35;}

    .card{
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      margin: 14px 0;
      background:#fff;
    }

    table{width:100%; border-collapse: collapse; table-layout: fixed;}
    th, td{border-top: 1px solid #f0f0f0; padding: 12px; vertical-align: top;}
    thead th{border-top: none; padding-top: 6px; padding-bottom: 14px; font-size: 15px;}
    th{color:#111; font-weight:700; text-align:center;}
    td{padding-top: 10px;}

    /* 4 columns */
    col.col{width:25%;}

    .cellTitle{
      font-weight: 800;
      margin: 2px 0 10px 0;
      font-size: 14px;
      text-align: left;
    }

    .viewer{
      position: relative;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      height: var(--viewer-h);
      background: #000;
    }
    a-scene{height: var(--viewer-h); width:100%;}

    .overlay-controls{
      position:absolute;
      left: 12px;
      bottom: 12px;
      display:flex;
      gap: 10px;
      z-index: 10;
    }
    .ovbtn{
      background: rgba(0,0,0,0.55);
      color: #fff;
      border: 2px solid rgba(255,255,255,0.7);
      border-radius: 12px;
      padding: 10px 16px;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
      backdrop-filter: blur(2px);
    }
    .ovbtn:active{transform: translateY(1px);}

    .footer{
      margin-top: 10px;
      color: #555;
      font-size: 14px;
    }

    /* responsive: if screen is narrow, stack columns */
    @media (max-width: 1100px){
      col.col{width:auto;}
      table, thead, tbody, tr, th, td{display:block;}
      thead{display:none;}
      tr{border-top:1px solid #eee;}
      td{border-top:none;}
      .viewer{height: 260px;}
      a-scene{height: 260px;}
    }

    .err{
      margin-top: 10px;
      background:#ffecec;
      border:1px solid #ffb3b3;
      color:#7a0000;
      padding: 12px;
      border-radius: 12px;
      font-size: 13px;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>
  <h1>Visually-Guided Spatial Audio Generation for 360° In-the-Wild Speech Scenes</h1>
  <div class="hint">🎧 Please wear headphones and drag the video to experience spatial audio rotation.</div>

  <div class="card">
    <table>
      <colgroup id="colgroup">
        <!-- injected -->
      </colgroup>
      <thead>
        <tr id="thead-row">
          <!-- injected -->
        </tr>
      </thead>
      <tbody id="samples-body">
        <!-- injected -->
      </tbody>
    </table>

    <div class="footer">We would like to thank Omnitone for the 360° interactive spatial audio rendering.</div>
    <div id="errbox" class="err" style="display:none;"></div>
  </div>

<script>
/** =========================
 *  EDIT THIS SECTION ONLY
 *  ========================= */
const ROT_SIGN = -1;

 // Each sample has multiple columns. Each column has its own (video + FOA audio).
 // Put the SAME video in each column if you want, and different audio for each model.
const SAMPLES = [
  {
    name: "Sample 1",
    cols: [
      { title: "GT",        video: "videos/Gb24E-LqZyE_31.webm", audio: "audios/Gb24E-LqZyE_31_gt.wav" },
      { title: "Baseline",  video: "videos/Gb24E-LqZyE_31.webm", audio: "audios/Gb24E-LqZyE_31_pred.wav" },
      { title: "Baseline 2",video: "videos/Gb24E-LqZyE_31.webm", audio: "audios/Gb24E-LqZyE_31_pred.wav" },
      { title: "Ours",      video: "videos/Gb24E-LqZyE_31.webm", audio: "audios/Gb24E-LqZyE_31_pred.wav" },
    ],
  },
];

// If you later want 5 columns, just add one more item in cols[].
// If you want fewer, delete an item.
/** ========================= */


/** ===== Helpers / Audio ===== */
let audioCtx = null;

function showErr(e){
  console.error(e);
  const box = document.getElementById("errbox");
  box.style.display = "block";
  box.textContent = (e && e.stack) ? e.stack : String(e);
}

async function resumeAudio(){
  if (!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 48000 });
  }
  if (audioCtx.state !== "running"){
    await audioCtx.resume();
  }
}

async function decodeBuffer(url){
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Fetch failed ${res.status}: ${url}`);
  const ab = await res.arrayBuffer();
  await resumeAudio();
  return await audioCtx.decodeAudioData(ab);
}

function estimateRMS(buf, ch){
  const data = buf.getChannelData(ch);
  let acc = 0;
  for (let i = 0; i < data.length; i += 64){
    const v = data[i];
    acc += v*v;
  }
  const mean = acc / Math.max(1, Math.floor(data.length/64));
  return Math.sqrt(mean);
}

function yawToMat3_rowMajor(yaw){
  const c = Math.cos(yaw), s = Math.sin(yaw);
  return [ c, 0, -s,
           0, 1,  0,
           s, 0,  c ];
}
  
/** ===== Player factory (FOA -> Omnitone) =====
 * OVERLAY-ONLY VERSION:
 *  - We REMOVE the big button panel under each video.
 *  - Each column is controlled ONLY by the two overlay buttons on the video:
 *      Play/Pause + Rewind
 *
 * How to tune loudness:
 *  - change gainOut.gain.value below (e.g., 2.0 ~ 4.0)
 */
async function createFOAController(label, audioUrl, getCameraYawRad){
  await resumeAudio();

  const r = Omnitone.createFOARenderer(audioCtx);
  await r.initialize();

  const gainOut = audioCtx.createGain();
  gainOut.gain.value = 2.8;
  r.output.connect(gainOut);
  gainOut.connect(audioCtx.destination);

  function applyYaw(yawRad){
    const m3 = yawToMat3_rowMajor(ROT_SIGN * yawRad);
    if (typeof r.setRotationMatrix3 === "function") r.setRotationMatrix3(m3);
    else if (typeof r.setRotationMatrix === "function") r.setRotationMatrix(m3);
    else if (r._foaRotator && typeof r._foaRotator.setRotationMatrix3 === "function") r._foaRotator.setRotationMatrix3(m3);
  }
  (function tick(){ applyYaw(getCameraYawRad()); requestAnimationFrame(tick); })();

  let buffer = null;
  let srcNode = null;
  let isPlaying = false;
  let startedAt = 0;
  let offset = 0;

  async function ensureLoaded(){
    if (!buffer){
      buffer = await decodeBuffer(audioUrl);
    }
  }

  function stopAll(){
    if (srcNode) { try { srcNode.stop(); } catch(e){} srcNode = null; }
    isPlaying = false;
    offset = 0;
  }

  function startOmnitone(sec){
    if (!buffer) return;
    if (srcNode) { try { srcNode.stop(); } catch(e){} }

    srcNode = audioCtx.createBufferSource();
    srcNode.buffer = buffer;

    // IMPORTANT: Omnitone input has a single input; we send the multichannel stream directly.
    srcNode.connect(r.input);

    offset = Math.max(0, Math.min(sec, buffer.duration - 0.001));
    startedAt = audioCtx.currentTime;
    srcNode.start(0, offset);

    isPlaying = true;

    srcNode.onended = () => {
      if (isPlaying){
        isPlaying = false;
        offset = 0;
      }
    };
  }

  function pauseOmnitone(){
    if (!isPlaying) return offset;
    const played = audioCtx.currentTime - startedAt;
    offset = offset + played;
    if (srcNode) { try { srcNode.stop(); } catch(e){} }
    isPlaying = false;
    return offset;
  }

  return {
    label,
    ensureLoaded,
    isPlaying: () => isPlaying,
    playFrom: async (sec) => { await resumeAudio(); await ensureLoaded(); startOmnitone(sec); },
    pause: () => pauseOmnitone(),
    stop: () => stopAll(),
    rewind: async () => { await resumeAudio(); await ensureLoaded(); startOmnitone(0); },
    getOffset: () => offset,
  };
}
/** ===== Build dynamic table ===== */
function renderHeader(colTitles){
  const colgroup = document.getElementById("colgroup");
  const thead = document.getElementById("thead-row");
  colgroup.innerHTML = "";
  thead.innerHTML = "";
  colTitles.forEach(() => {
    const c = document.createElement("col");
    c.className = "col";
    colgroup.appendChild(c);
  });
  colTitles.forEach(t => {
    const th = document.createElement("th");
    th.textContent = t;
    thead.appendChild(th);
  });
}

function buildRow(sample, idx){
  const tbody = document.getElementById("samples-body");
  const tr = document.createElement("tr");

  sample.cols.forEach((col, j) => {
    const td = document.createElement("td");

    // Title line
    const title = document.createElement("div");
    title.className = "cellTitle";
    title.textContent = `${sample.name} · ${col.title}`;
    td.appendChild(title);

    // Viewer
    const viewer = document.createElement("div");
    viewer.className = "viewer";
    td.appendChild(viewer);

    const vidDomId = `viddom-${idx}-${j}`;

    viewer.innerHTML = `
      <a-scene embedded vr-mode-ui="enabled:true">
        <a-assets>
          <video id="${vidDomId}" crossorigin="anonymous" playsinline webkit-playsinline preload="auto">
            <source src="${col.video}" type="video/webm">
          </video>
        </a-assets>

        <a-videosphere src="#${vidDomId}" rotation="0 -90 0"></a-videosphere>
        <a-camera look-controls="enabled:true"></a-camera>
      </a-scene>

      <div class="overlay-controls">
        <div class="ovbtn" data-role="rew">Rewind</div>
        <div class="ovbtn" data-role="pp">Play</div>
      </div>
    `;

    const v = viewer.querySelector("video");
    const btnPP = viewer.querySelector('[data-role="pp"]');
    const btnRew = viewer.querySelector('[data-role="rew"]');
    const sceneEl = viewer.querySelector("a-scene");

    // camera yaw
    let camEl = null;
    function getCameraYawRad(){ return camEl ? camEl.object3D.rotation.y : 0; }
    sceneEl.addEventListener("loaded", () => {
      camEl = (sceneEl.camera && sceneEl.camera.el) ? sceneEl.camera.el : sceneEl.querySelector("a-camera");
    });

    async function playVideo(){
      // mute to avoid mixing the video's own audio track (if any)
      v.muted = true;
      v.loop = false;
      await v.play();
    }

    // Audio controller (NO UI)
    const ctrlReady = (async () => {
      try{ return await createFOAController(col.title, col.audio, getCameraYawRad); }
      catch(e){ showErr(e); throw e; }
    })();

    // Overlay drives THIS column's audio + video
    btnPP.addEventListener("click", async () => {
      try{
        const ctrl = await ctrlReady;
        await resumeAudio();

        if (v.paused){
          const t = Math.max(0, v.currentTime || 0);
          await ctrl.playFrom(t);
          await playVideo();
          btnPP.textContent = "Pause";
        }else{
          const t = ctrl.pause();
          v.pause();
          if (typeof t === "number" && isFinite(t)) v.currentTime = t;
          btnPP.textContent = "Play";
        }
      }catch(e){ showErr(e); }
    });

    btnRew.addEventListener("click", async () => {
      try{
        const ctrl = await ctrlReady;
        await resumeAudio();
        v.currentTime = 0;
        await ctrl.playFrom(0);
        await playVideo();
        btnPP.textContent = "Pause";
      }catch(e){ showErr(e); }
    });

    v.addEventListener("ended", async () => {
      btnPP.textContent = "Play";
      try{ const ctrl = await ctrlReady; ctrl.pause(); }catch(e){}
    });

    tr.appendChild(td);
  });

  tbody.appendChild(tr);
}

document.addEventListener("DOMContentLoaded", () => {
  try{
    if (!SAMPLES.length) return;

    // take titles from the first sample's columns
    renderHeader(SAMPLES[0].cols.map(c => c.title));

    SAMPLES.forEach((s, i) => buildRow(s, i));
  }catch(e){ showErr(e); }
});
</script>
</body>
</html>
